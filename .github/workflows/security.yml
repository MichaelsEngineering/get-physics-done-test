name: security

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".gitignore"
      - "Makefile"
      - "dev/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".gitignore"
      - "Makefile"
      - "dev/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    - cron: "21 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run dependency audit
        run: uv run make security-audit

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Sync dependencies
        run: uv sync --dev
      - name: Generate SBOM
        run: uv run make sbom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: cyclonedx-sbom
          path: runs/security/sbom.cdx.json
          if-no-files-found: error

  attest:
    name: attest
    runs-on: ubuntu-latest
    needs:
      - sbom
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Sync dependencies
        run: uv sync --dev
      - name: Generate SBOM for attestation subject
        run: uv run make sbom
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018
        with:
          subject-path: runs/security/sbom.cdx.json
